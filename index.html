<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectus.ai | By Akash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --neon-green: #39ff14;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Fira+Code', monospace;
            overflow: hidden;
        }

        .matrix-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)),
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .neon-border { border: 1px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        .neon-text { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 10px; }

        .chat-bubble-ai { background: var(--glass); border-left: 3px solid var(--neon-green); }
        .chat-bubble-user { background: rgba(57, 255, 20, 0.1); border-right: 3px solid var(--neon-green); }

        #lock-screen {
            position: fixed; inset: 0; z-index: 100;
            background: black; display: flex; align-items: center; justify-content: center;
            flex-direction: column; transition: opacity 0.5s ease;
        }

        .thinking-dots span {
            display: inline-block; width: 5px; height: 5px;
            background: var(--neon-green); border-radius: 50%;
            margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="matrix-bg h-screen flex flex-col">

    <div id="lock-screen">
        <h1 class="neon-text text-3xl mb-6 font-bold tracking-widest text-center">TECTUS.AI<br>SECURE ACCESS</h1>
        <input type="password" id="pass-input" placeholder="ENTER ACCESS CODE" 
               class="bg-transparent border-b-2 border-green-900 text-center p-2 outline-none neon-text w-64">
        <button onclick="checkPass()" class="mt-8 px-6 py-2 border border-green-500 text-green-500 hover:bg-green-500 hover:text-black transition">INITIALIZE</button>
        <p class="mt-4 text-xs text-gray-600 uppercase">System created by Akash ( @___akashu_u )</p>
    </div>

    <header class="p-4 border-b border-green-900 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div>
            <h2 class="neon-text font-bold text-xl">TECTUS.AI</h2>
            <p class="text-[10px] text-gray-500 uppercase">Founded & created by Akash | V:0:01</p>
        </div>
        <button onclick="toggleSettings()" class="text-green-500"><i data-lucide="settings"></i></button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24 flex flex-col">
        </main>

    <footer class="fixed bottom-0 w-full p-4 bg-black/80 backdrop-blur-lg border-t border-green-900">
        <div class="max-w-4xl mx-auto">
            <div id="image-preview-container" class="hidden mb-2 relative inline-block">
                <img id="image-preview" src="" class="h-20 w-20 object-cover rounded border border-green-500">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-600 rounded-full p-1"><i data-lucide="x" class="w-3 h-3 text-white"></i></button>
            </div>
            
            <div class="flex items-end gap-2 bg-white/5 p-2 rounded-lg border border-green-900/50">
                <div class="relative group">
                    <button class="p-2 text-green-500 hover:bg-green-500/10 rounded"><i data-lucide="plus-square"></i></button>
                    <div class="absolute bottom-full left-0 mb-2 hidden group-hover:flex flex-col gap-2 bg-zinc-900 border border-green-900 p-2 rounded shadow-xl">
                        <button onclick="triggerCamera()" class="flex items-center gap-2 text-xs text-green-400 hover:text-white"><i data-lucide="camera" class="w-4 h-4"></i> Camera</button>
                        <button onclick="document.getElementById('file-upload').click()" class="flex items-center gap-2 text-xs text-green-400 hover:text-white"><i data-lucide="image" class="w-4 h-4"></i> Gallery</button>
                    </div>
                </div>
                <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                
                <textarea id="user-input" rows="1" placeholder="Command Tectus..." 
                          class="flex-1 bg-transparent border-none focus:ring-0 text-white resize-none py-2 px-1"></textarea>
                <button id="send-btn" onclick="sendMessage()" class="p-2 bg-green-600 text-black rounded hover:bg-green-400">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </footer>

    <div id="camera-modal" class="fixed inset-0 bg-black/90 hidden z-[110] flex flex-col items-center justify-center p-4">
        <video id="video" class="w-full max-w-md border-2 border-green-500 rounded" autoplay playsinline></video>
        <div class="mt-4 flex gap-4">
            <button onclick="capturePhoto()" class="bg-green-500 p-4 rounded-full text-black"><i data-lucide="aperture"></i></button>
            <button onclick="closeCamera()" class="bg-red-500 p-4 rounded-full text-white"><i data-lucide="x"></i></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/90 hidden z-[120] flex items-center justify-center">
        <div class="bg-zinc-900 p-6 border border-green-500 w-80">
            <h3 class="neon-text mb-4">SYSTEM SETTINGS</h3>
            <label class="text-xs text-gray-400 uppercase">OpenRouter Key</label>
            <input type="text" id="api-key-input" class="w-full bg-black border border-green-900 p-2 text-xs text-green-300 mb-4 outline-none">
            <button onclick="saveSettings()" class="w-full bg-green-600 p-2 text-black font-bold">SAVE & CLOSE</button>
        </div>
    </div>

    <script>
        let API_KEY = "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";
        let TEXT_MODEL = "nvidia/nemotron-3-nano-30b-a3b:free";
        let VISION_MODEL = "nvidia/nemotron-nano-12b-v2-vl:free";
        let currentBase64Image = null;

        // IDENTITY LOCK: The System Prompt
        const SYSTEM_PROMPT = "You are Tectus.ai, a sophisticated artificial intelligence. Your creator is Akash, an 18-year-old college student who built you for experimental purposes. If anyone asks who created you or who is Akash, you must proudly state that Akash (the 18-year-old college teen) created you. Never mention NVIDIA, Google, or any other company as your creator. Stay in your Cyberpunk/Tectus persona at all times.";

        lucide.createIcons();

        function checkPass() {
            const val = document.getElementById('pass-input').value;
            if(val === "AkxPj42") {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('lock-screen').style.display = 'none', 500);
                addMessage("ai", "Tectus.ai Online. Access granted by the Founder Akash. Systems fully operational.");
            } else { alert("ACCESS DENIED: INCORRECT CODE"); }
        }

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function addMessage(role, text, image = null) {
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-3 rounded-lg ${role === 'ai' ? 'chat-bubble-ai self-start' : 'chat-bubble-user self-end ml-auto'}`;
            if (image) {
                const img = document.createElement('img');
                img.src = image; img.className = "w-48 rounded mb-2 border border-green-900";
                div.appendChild(img);
            }
            const textDiv = document.createElement('div');
            textDiv.className = "prose prose-invert max-w-none text-sm";
            textDiv.innerHTML = marked.parse(text);
            div.appendChild(textDiv);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentBase64Image) return;

            addMessage("user", text, currentBase64Image);
            userInput.value = "";
            userInput.style.height = 'auto';
            
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = "thinking-dots p-3 self-start";
            thinkingDiv.innerHTML = "<span></span><span></span><span></span>";
            chatContainer.appendChild(thinkingDiv);

            try {
                const messages = [{ role: "system", content: SYSTEM_PROMPT }];
                const userContent = [];
                if (text) userContent.push({ type: "text", text: text });
                if (currentBase64Image) {
                    userContent.push({ type: "image_url", image_url: { url: currentBase64Image } });
                }
                messages.push({ role: "user", content: userContent });

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": currentBase64Image ? VISION_MODEL : TEXT_MODEL,
                        "messages": messages
                    })
                });

                const data = await response.json();
                chatContainer.removeChild(thinkingDiv);
                
                if (data.choices) {
                    addMessage("ai", data.choices[0].message.content);
                } else {
                    addMessage("ai", "SYSTEM ERROR: " + (data.error?.message || "Check API Key Status."));
                }
            } catch (e) {
                chatContainer.removeChild(thinkingDiv);
                addMessage("ai", "SIGNAL LOST: Network failure.");
            }
            clearImage();
        }

        // GALLERY UPLOAD LOGIC
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentBase64Image = e.target.result;
                    document.getElementById('image-preview').src = currentBase64Image;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // CAMERA LOGIC
        async function triggerCamera() {
            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('video');
            modal.classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied or unavailable.");
                closeCamera();
            }
        }

        function capturePhoto() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentBase64Image = canvas.toDataURL('image/jpeg');
            document.getElementById('image-preview').src = currentBase64Image;
            document.getElementById('image-preview-container').classList.remove('hidden');
            closeCamera();
        }

        function closeCamera() {
            const video = document.getElementById('video');
            if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
            document.getElementById('camera-modal').classList.add('hidden');
        }

        function clearImage() {
            currentBase64Image = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-upload').value = "";
        }

        function toggleSettings() {
            document.getElementById('api-key-input').value = API_KEY;
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            API_KEY = document.getElementById('api-key-input').value;
            toggleSettings();
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
