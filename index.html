<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Territory Capture Web App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(11, 12, 16, 0.85);
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --text-main: #e0e0e0;
            --font-stack: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Map Styling (Dark Futuristic via Filter) --- */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Magic trick to make standard OSM tiles look dark & futuristic */
        .leaflet-tile-pane {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(120%);
        }

        /* Glowing Polygon Animation */
        .glowing-polygon {
            stroke: var(--neon-blue);
            stroke-width: 3px;
            fill: var(--neon-blue);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { fill-opacity: 0.15; filter: drop-shadow(0 0 5px var(--neon-blue)); }
            100% { fill-opacity: 0.4; filter: drop-shadow(0 0 15px var(--neon-blue)); }
        }

        /* --- UI Panels --- */
        .ui-panel {
            position: relative;
            z-index: 1000;
            background: var(--panel-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        }

        /* Header / Stats Board */
        #header-panel {
            border-bottom: 2px solid var(--neon-blue);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
            margin-bottom: 5px;
        }

        .title-bar h1 {
            font-size: 1.2rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        #status-indicator {
            font-size: 0.9rem;
            color: var(--neon-red);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.85rem;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px;
            border-left: 3px solid var(--neon-green);
        }

        .stat-label {
            color: #aaa;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.1rem;
            color: #fff;
            margin-top: 3px;
        }

        #badge-container {
            margin-top: 5px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .badge {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid gold;
            color: gold;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            text-shadow: 0 0 5px gold;
        }

        /* Bottom Controls */
        #controls-panel {
            margin-top: auto;
            border-top: 2px solid var(--neon-blue);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--neon-blue);
            padding: 10px 15px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            flex-grow: 1;
            max-width: 180px;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        button.btn-start { border-color: var(--neon-green); color: var(--neon-green); }
        button.btn-start:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 10px var(--neon-green); }
        
        button.btn-stop { border-color: var(--neon-red); color: var(--neon-red); }
        button.btn-stop:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 10px var(--neon-red); }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="header-panel" class="ui-panel">
        <div class="title-bar">
            <h1>Territory Capture</h1>
            <span id="status-indicator">STANDBY</span>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Coordinates</div>
                <div class="stat-value" id="val-coords">-- , --</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Current Speed</div>
                <div class="stat-value"><span id="val-speed">0.0</span> m/s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Dist. Walked</div>
                <div class="stat-value"><span id="val-distance">0</span> m</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Est. Area</div>
                <div class="stat-value"><span id="val-area">0</span> sq m</div>
            </div>
        </div>
        
        <div id="badge-container">
            </div>
    </div>

    <div id="map"></div>

    <div id="controls-panel" class="ui-panel">
        <button id="btn-start" class="btn-start">Start Tracking</button>
        <button id="btn-stop" class="btn-stop" disabled>Stop & Capture</button>
        <button id="btn-save">Save Territory</button>
        <button id="btn-clear">Clear Data</button>
        <button id="btn-export">Export JSON</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // --- 1. State Management ---
        let state = {
            tracking: false,
            coords: [],       // Array of [lat, lng]
            distance: 0,
            area: 0,
            badges: []
        };
        
        let map, userMarker, pathPolyline, territoryPolygon;
        let watchId = null;

        const BADGE_THRESHOLDS = [
            { area: 500, badge: "Rookie Explorer" },
            { area: 2000, badge: "Territory Master" },
            { area: 5000, badge: "Land Conqueror" }
        ];

        // --- 2. Initialization ---
        function initApp() {
            // Setup Map
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            
            // OpenStreetMap layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Attempt to get initial location to center map
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                }, () => console.log("Awaiting user permission..."));
            }

            // Bind Buttons
            document.getElementById('btn-start').addEventListener('click', startTracking);
            document.getElementById('btn-stop').addEventListener('click', stopTracking);
            document.getElementById('btn-save').addEventListener('click', saveTerritory);
            document.getElementById('btn-clear').addEventListener('click', clearTerritory);
            document.getElementById('btn-export').addEventListener('click', exportData);

            // Load saved data
            loadTerritory();
        }

        // --- 3. Tracking Logic ---
        function startTracking() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }

            state.tracking = true;
            updateUIState();
            
            // Clear previous polygon if starting new track
            if (territoryPolygon) {
                map.removeLayer(territoryPolygon);
                territoryPolygon = null;
            }

            watchId = navigator.geolocation.watchPosition(
                handlePositionUpdate, 
                handleGeoError, 
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        function stopTracking() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            state.tracking = false;
            
            // Close the polygon and calculate area
            if (state.coords.length >= 3) {
                drawPolygon();
                state.area = calculatePolygonArea(state.coords);
                checkGamification(state.area);
            }
            
            updateUIState();
        }

        function handlePositionUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const speed = position.coords.speed || 0; // m/s
            const newPoint = [lat, lng];

            // Update Map Marker
            if (!userMarker) {
                userMarker = L.circleMarker(newPoint, {
                    color: '#39ff14', fillColor: '#39ff14', fillOpacity: 0.8, radius: 6
                }).addTo(map);
            } else {
                userMarker.setLatLng(newPoint);
            }

            // Auto-pan map
            map.panTo(newPoint);

            // Add point, calc distance, draw path
            if (state.coords.length > 0) {
                const lastPoint = state.coords[state.coords.length - 1];
                const dist = haversine(lastPoint[0], lastPoint[1], lat, lng);
                state.distance += dist;
            }
            state.coords.push(newPoint);

            if (!pathPolyline) {
                pathPolyline = L.polyline(state.coords, { color: '#00f0ff', weight: 4 }).addTo(map);
            } else {
                pathPolyline.setLatLngs(state.coords);
            }

            // Update UI
            document.getElementById('val-coords').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('val-speed').textContent = speed.toFixed(1);
            document.getElementById('val-distance').textContent = Math.round(state.distance);
        }

        function handleGeoError(error) {
            console.warn(`ERROR(${error.code}): ${error.message}`);
            if (error.code === 1) {
                alert("Permission denied. Please allow location access to play.");
                stopTracking();
            }
        }

        // --- 4. Map Drawing & Math ---
        function drawPolygon() {
            if (territoryPolygon) map.removeLayer(territoryPolygon);
            
            territoryPolygon = L.polygon(state.coords, { 
                className: 'glowing-polygon' // Custom CSS class for animation
            }).addTo(map);
            
            // Zoom to fit captured territory
            map.fitBounds(territoryPolygon.getBounds());
        }

        // Haversine formula for distance (returns meters)
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Shoelace formula approximation for local coordinates area
        function calculatePolygonArea(coords) {
            if (coords.length < 3) return 0;
            const R = 6378137; // Earth radius in meters
            const lat0 = coords[0][0];
            const lng0 = coords[0][1];
            let area = 0;
            
            // Convert to local XY plane in meters
            let pts = coords.map(c => {
                let x = (c[1] - lng0) * (Math.PI / 180) * R * Math.cos(lat0 * Math.PI / 180);
                let y = (c[0] - lat0) * (Math.PI / 180) * R;
                return {x, y};
            });
            
            // Shoelace calculation
            for (let i = 0; i < pts.length; i++) {
                let j = (i + 1) % pts.length;
                area += pts[i].x * pts[j].y;
                area -= pts[j].x * pts[i].y;
            }
            return Math.abs(area / 2);
        }

        // --- 5. Gamification & Audio ---
        function checkGamification(currentArea) {
            let newlyUnlocked = false;
            BADGE_THRESHOLDS.forEach(b => {
                if (currentArea >= b.area && !state.badges.includes(b.badge)) {
                    state.badges.push(b.badge);
                    newlyUnlocked = true;
                }
            });

            if (newlyUnlocked) {
                playBadgeSound();
                renderBadges();
            }
        }

        function playBadgeSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); 
                
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch(e) { console.log("Audio skipped"); }
        }

        // --- 6. Persistence & Export ---
        function saveTerritory() {
            if (state.coords.length === 0) return alert("Nothing to save!");
            localStorage.setItem('territoryData', JSON.stringify(state));
            alert("Territory Saved to Local Storage!");
        }

        function loadTerritory() {
            const saved = localStorage.getItem('territoryData');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.coords = parsed.coords || [];
                state.distance = parsed.distance || 0;
                state.area = parsed.area || 0;
                state.badges = parsed.badges || [];
                
                if (state.coords.length > 0) {
                    pathPolyline = L.polyline(state.coords, { color: '#00f0ff', weight: 4 }).addTo(map);
                    if (state.coords.length >= 3) {
                        drawPolygon();
                    } else {
                        map.setView(state.coords[0], 16);
                    }
                }
                updateUIState();
                renderBadges();
            }
        }

        function clearTerritory() {
            if(confirm("Are you sure you want to clear all territory data?")) {
                state = { tracking: false, coords: [], distance: 0, area: 0, badges: [] };
                if(pathPolyline) map.removeLayer(pathPolyline);
                if(territoryPolygon) map.removeLayer(territoryPolygon);
                if(userMarker) map.removeLayer(userMarker);
                pathPolyline = null;
                territoryPolygon = null;
                userMarker = null;
                localStorage.removeItem('territoryData');
                updateUIState();
                renderBadges();
                document.getElementById('val-coords').textContent = '-- , --';
            }
        }

        function exportData() {
            if (state.coords.length === 0) return alert("No data to export!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "territory_export.json");
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        // --- 7. UI Rendering ---
        function updateUIState() {
            const statusIndicator = document.getElementById('status-indicator');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');

            if (state.tracking) {
                statusIndicator.textContent = "TRACKING LIVE";
                statusIndicator.style.color = "var(--neon-green)";
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                statusIndicator.textContent = "STANDBY";
                statusIndicator.style.color = "var(--neon-red)";
                btnStart.disabled = false;
                btnStop.disabled = true;
            }

            document.getElementById('val-distance').textContent = Math.round(state.distance);
            document.getElementById('val-area').textContent = Math.round(state.area);
            if (!state.tracking) {
                document.getElementById('val-speed').textContent = "0.0";
            }
        }

        function renderBadges() {
            const container = document.getElementById('badge-container');
            container.innerHTML = '';
            state.badges.forEach(b => {
                const span = document.createElement('span');
                span.className = 'badge';
                span.textContent = b;
                container.appendChild(span);
            });
        }

        // Boot
        window.onload = initApp;

    </script>
</body>
          </html>
